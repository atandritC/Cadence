services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cadence
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .                     
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cadence
      SPRING_DATASOURCE_USERNAME: cadence
      SPRING_DATASOURCE_PASSWORD: cadence

volumes:
  pgdata: